name: CI Pipeline

on:
  pull_request:
    branches: [develop, staging, main]
  push:
    branches: [develop, staging, main]

jobs:
  test:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.10, 3.11]

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest flake8 black isort mypy bandit

      - name: Lint
        run: flake8 . --ignore=E501,W503

      - name: Format check
        run: black --check .

      - name: Import order
        run: isort --check-only .

      - name: Type check
        run: mypy .

      - name: Security scan
        run: bandit -r . -s B101,B102

      - name: Run tests
        run: pytest tests/

      - name: Run tests with coverage
        run: pytest --cov=agent tests/

      - name: Setup Git for tag push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          # Only create tag if it doesn't exist
          TAG=$(date +'%Y%m%d%H%M%S')
          echo "Generated tag: $TAG"
          git tag $TAG
          git push https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/xing007-lab/AttribAgent.git $TAG
          echo "::set-output name=TAG::$TAG"

env:
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}