name: Python CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.11]

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Set up Python
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest openpyxl streamlit flake8 agent_offline

      # 4️⃣ Run unit tests (agent offline)
      - name: Run unit tests
        run: |
          pytest tests/test_agent_basic.py
          pytest tests/test_agent_edge_cases.py
          pytest tests/test_agent_shapley.py

      # 5️⃣ Run Streamlit UI tests (headless)
      - name: Run Streamlit UI tests
        run: |
          pytest tests/test_streamlit_ui.py

      # 6️⃣ Lint code
      - name: Lint code
        run: |
          flake8 . --max-line-length=120